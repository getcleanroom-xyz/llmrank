name: Weekly Blog Post

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger blog generation
        run: |
          curl -sSf --retry 3 --retry-delay 10 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.BLOG_WEBHOOK_SECRET }}" \
            https://api.llmranked.org/api/v1/admin/blog/webhook
