name: Ping Render

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ping.yml"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API to prevent sleep
        run: curl -sSf --retry 3 --retry-delay 5 https://api.llmranked.org/health > /dev/null 2>&1 || echo "Ping failed (server may be waking up)"
